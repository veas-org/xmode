# Kamal deployment for the open-source xmode app.
# Landing is deployed separately from /Users/marcin/Documents/xmode-landing.

service: xmode
image: veas-org/xmode
deploy_timeout: 180

servers:
  web:
    - 129.153.38.146
  job:
    hosts:
      - 129.153.38.146
    cmd: bin/jobs

proxy:
  ssl: true
  hosts:
    - app.xmode.m9sh.com
  app_port: 3000
  healthcheck:
    path: /up
    interval: 5
    timeout: 10

registry:
  server: ghcr.io
  username: veas-org
  password:
    - KAMAL_REGISTRY_PASSWORD

builder:
  local: false
  remote: ssh://opc@129.153.38.146
  arch: arm64

env:
  clear:
    RAILS_ENV: production
    SOLID_QUEUE_IN_PUMA: "false"
    WEB_CONCURRENCY: "2"
    RAILS_MAX_THREADS: "5"
    APPLICATION_HOST: "app.xmode.m9sh.com"
    FORCE_SSL: "true"
    APP_BASE_URL: "https://app.xmode.m9sh.com"
    LANDING_BASE_URL: "https://xmode.m9sh.com"
    POSTGRES_HOST: "xmode-postgres"
    POSTGRES_USER: "xmode"
    DEMO_PLANET_EXPRESS: "1"
    LOCAL_MODEL_RUNTIME: "ollama"
    LOCAL_MODEL_BASE_URL: "http://xmode-ollama:11434"
    LOCAL_MODEL_NAME: "qwen3-coder:30b"
    LOCAL_MODEL_TIMEOUT_SECONDS: "300"
  secret:
    - RAILS_MASTER_KEY
    - POSTGRES_PASSWORD
    - ADMIN_EMAIL
    - ADMIN_PASSWORD
    - STRIPE_API_KEY
    - STRIPE_WEBHOOK_SECRET
    - XMODE_GITHUB_APP_ID
    - XMODE_GITHUB_APP_SLUG
    - XMODE_GITHUB_APP_PRIVATE_KEY
    - ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY
    - ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY
    - ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT

volumes:
  - "xmode_storage:/rails/storage"

accessories:
  postgres:
    image: postgres:16-alpine
    host: 129.153.38.146
    env:
      clear:
        POSTGRES_USER: xmode
        POSTGRES_DB: xmode_primary_production
        POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - "xmode_postgres_data:/var/lib/postgresql/data"
  ollama:
    image: ollama/ollama:latest
    host: 129.153.38.146
    env:
      clear:
        OLLAMA_HOST: "0.0.0.0:11434"
        OLLAMA_KEEP_ALIVE: "5m"
        OLLAMA_NUM_PARALLEL: "1"
    volumes:
      - "xmode_ollama:/root/.ollama"

asset_path: /rails/public/assets

aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole"

ssh:
  user: opc
